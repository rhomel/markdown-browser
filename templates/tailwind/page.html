<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if .Title}}{{.Title}}{{else}}Markdown Browser{{end}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 antialiased">
  <main class="mx-auto max-w-4xl px-4 py-10 sm:px-6">
    <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
      <div class="border-b border-slate-200 px-6 py-4">
        <div class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">Markdown Browser</div>
        {{if .Title}}<h1 class="mt-1 text-2xl font-bold tracking-tight text-slate-900">{{.Title}}</h1>{{end}}
      </div>
      <div class="prose prose-slate max-w-none px-6 py-6">
        {{.Body}}
      </div>
    </div>
  </main>
</body>
</html>
