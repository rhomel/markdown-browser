<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if .Title}}{{.Title}}{{else}}Directory{{end}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-50 to-slate-100 text-slate-900 antialiased">
  <main class="mx-auto max-w-4xl px-4 py-10 sm:px-6">
    <section class="rounded-2xl border border-slate-200 bg-white shadow-sm">
      <header class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">Index</p>
          <h1 class="mt-1 text-2xl font-bold tracking-tight">{{if .Title}}{{.Title}}{{else}}Directory{{end}}</h1>
        </div>
        <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600">Tailwind template</span>
      </header>
      <div class="px-6 py-6 text-slate-800 [&_ul]:ml-5 [&_ul]:list-disc [&_li]:my-2 [&_a]:font-medium [&_a]:text-blue-700 hover:[&_a]:text-blue-900">
        {{.Body}}
      </div>
    </section>
  </main>
</body>
</html>
