<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if .Title}}{{.Title}}{{else}}Article{{end}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 antialiased">
  <main class="mx-auto max-w-3xl px-4 py-10 sm:px-6">
    <article class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
      <header class="border-b border-slate-200 bg-slate-50 px-6 py-4">
        <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">Article</p>
        {{if .Title}}<h1 class="mt-1 text-2xl font-bold tracking-tight">{{.Title}}</h1>{{end}}
      </header>
      <div class="prose prose-slate max-w-none px-6 py-6 prose-headings:tracking-tight prose-a:text-blue-700">
        {{.Body}}
      </div>
    </article>
  </main>
</body>
</html>
